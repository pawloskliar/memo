  Sehr geeherte Online-Elektro,
  
  ich schreibe Sie, weil ich Sie über ein Problem mit meiner Bestellung informieren möchte.
  Bei Ihre Online-Geschäft habe ich am letzte Freitag mich einen neuen Laptop bestellt.
  Ich habe es schön bekommt, aber ich kann es nicht anschalten. Wenn ich den Power Knopf drücke, ganz nichts passiert ist.
  Ich will dieses Problem schnell wie möglich lösen. Könnten Sie mich dafür bitte helfen?
  Ich möchte bei Ihnen erkundigen, ob es ein officielles Service-Center in Berlin gibt. Wenn ja, lassen Sie mich bitte die Addresse.
  Wenn ich den Laptop in zwei Tage reparieren könnte, werde ich leider zurück schicken.
  Vielen Dank im Voraus für Ihre Rückmeldung!
  Pavlo
